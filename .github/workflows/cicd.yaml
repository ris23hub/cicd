name: java cicd Pipeline

on:
 push: 
  branches: 
    - main

jobs:
 compile_build_unitTest:
  runs-on: ubuntu-latest

  steps:
     
     - name: Executing code checkout
       run: echo "Checkout job -1 "

     - name : checkout code 
       uses : actions/checkout@v5

     - name: Executing compile and build jobs -1
       run: echo "Dependency download"

     - name: Java setup 
       uses: actions/setup-java@v4
       with:
        java-version: '17'
        distribution: 'temurin'

     - name: Build with Maven
       run: mvn compile

     - name: Build with Maven
       run: mvn test

     - name: Build project
       run: mvn package

     - name: Check build output
       run: |
             echo "Listing project files"
             ls -R

     - name : Docker login
       uses: docker/login-action@v3
       with:
        username: ${{ vars.DOCKER_USERNAME}} 
        password: ${{ secrets.DOCKER_PASSWORD}} 

     - name: Set up QEMU
       uses: docker/setup-qemu-action@v3
     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3
     - name: Build and push
       uses: docker/build-push-action@v6
       with:
          push: true
          tags: rishabapr/abankapp:latest
          file: ./Dockerfile
         
       




  