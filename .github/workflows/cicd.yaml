name: java cicd Pipeline

on:
 push: 
  branches: 
    - main

jobs:
 compile_and_build:
  runs-on: ubuntu-latest

  steps:
     
     - name: Executing code checkout
       runs: echo "Checkout job -1 "

     - name : checkout code 
       uses : actions/checkout@v5

     - name: Executing compile and build jobs -1
       runs: echo "Dependency download"

     - name: Java setup 
       uses: actions/setup-java@v4
       with:
        java-version: '17'
        distribution: 'temurin'

     - name: Build with Maven
       run: mvn compile


  